# GraalVM native-image build arguments for MaxiCP shared library.
# These options are automatically picked up when the jar is on the class-path.
#
# Key flags:
#   --shared           build a shared library (DLL/dylib/so) instead of an executable
#   --no-fallback      fail hard rather than silently falling back to JVM mode
#   -H:+ReportExceptionStackTraces  print Java stack traces for diagnostics
#
# NOTE: the actual --shared flag is passed by exec-maven-plugin in pom.xml (native profile).
# The properties here carry flags that are always applied when the jar is processed.
Args = --no-fallback \
       -H:+ReportExceptionStackTraces \
       --initialize-at-build-time=org.maxicp.bindings.HandleRegistry \
       -H:+AddAllCharsets

