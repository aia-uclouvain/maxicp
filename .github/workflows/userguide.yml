name: Userguide

on:
  push:
    branches:
      - main
jobs:
  userguide:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        maven: ['3.8.5']
        java: [ '21' ]
    steps:
      - name: Step0 - Check out the repository
        uses: actions/checkout@v3
      - name: Step1 - Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - name: Step2 - Install python dependencies
        run: |
          pwd
          ls -lah
          cd userguide
          # python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Step3 - Check source-code links in RST files
        run: |
          python userguide/check_source_links.py
      - name: Step4 - Build user guide
        run: |
          pwd
          ls -lah
          cd userguide
          make html
          mv build/html /tmp/.
      - uses: actions/checkout@v3
        with:
          ref: gh-pages
      - name: Step5 - add html
        run: |
          git config --local user.email "github-actions@users.noreply.github.com"
          git config --local user.name "github-actions"
          if [ -z "$(ls -A .)" ]; then
            git rm -r *
          fi
          cp -r /tmp/html/* .
          touch .nojekyll
          git add -A
          git commit -m "update userguide" || echo "No changes to commit"
      - name: Step6 - Push changes to gh-page branch
        run: |
          for i in {1..5}; do
            git pull --rebase origin gh-pages || true
            if git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed, retrying..."
            sleep $((RANDOM % 10 + 5))
          done
          echo "Failed to push to gh-pages after multiple attempts."
          exit 1
